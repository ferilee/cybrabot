name: Backend Tests

on:
  push:
    paths:
      - 'api/**'
      - 'bot/**'
      - 'db/**'
      - 'lib/**'
      - 'skills/**'
      - 'test/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'bot/**'
      - 'db/**'
      - 'lib/**'
      - 'skills/**'
      - 'test/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/backend-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Run backend tests
        run: bun test --preload ./test/preload.ts
